; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-core2]
platform = espressif32@6.12.0
board = m5stack-core2
framework = arduino
upload_speed = 921600
monitor_speed = 115200
board_build.partitions = default_16MB.csv
board_build.f_cpu = 240000000L
build_type = debug
build_unflags = -std=gnu++11
build_flags = 
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=5 
    -DM5STACK_CORE2
    -mfix-esp32-psram-cache-issue
    -std=gnu++17 
    ;-DUSE_SINGLE_BUFFER ; Don't use two buffers for DMA

lib_deps =
;	<select libraries with "PIO Home" -> Libraries

  https://github.com/M5Stack/M5Unified.git
  #https://github.com/M5Stack/M5GFX.git

  greiman/SdFat@^2.3.1
  
  flowduino/ESPressio-Threads@^1.0.0
  
  # RECOMMENDED
  # Accept new functionality in a backwards compatible manner and patches
  adafruit/Adafruit MCP4728 @ ^1.0.9

  # RECOMMENDED
  # Accept new functionality in a backwards compatible manner and patches
  bblanchon/ArduinoJson @ ^7.4.2

  # RECOMMENDED
  # Accept new functionality in a backwards compatible manner and patches
  mkeras/EmbeddedSparkplugNode @ ^0.2.5

##-- you NEED the next line (with the correct port)
##-- or the data upload will NOT work!
#upload_port = </dev/serial_port>
monitor_filters = esp32_exception_decoder