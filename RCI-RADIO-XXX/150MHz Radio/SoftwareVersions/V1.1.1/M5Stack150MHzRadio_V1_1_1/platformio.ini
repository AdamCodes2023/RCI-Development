; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
workspace_dir = .pio.nosync
default_envs = myBoard

[env:myBoard]
;-- esp32
platform = https://github.com/platformio/platform-espressif32.git
board = m5stack-core2
framework = arduino
#board_build.partitions = <min_spiffs.csv>
#board_build.filesystem = <LittleFS>|<SPIFFS>
monitor_speed = 115200
upload_speed = 921600
board_build.f_cpu = 240000000L
build_unflags = 
    -std=gnu++11
build_flags = 
    -DBOARD_HAS_PSRAM 
    -DM5STACK_CORE2
    -mfix-esp32-psram-cache-issue
    -std=gnu++17 
    ;-DUSE_SINGLE_BUFFER ; Don't use two buffers for DMA

lib_deps =
;	Select libraries with "PIO Home" -> Libraries

  #https://github.com/M5Stack/M5Unified.git
  #https://github.com/M5Stack/M5GFX.git

  # RECOMMENDED
  # Accept new functionality in a backwards compatible manner and patches
  adafruit/Adafruit MCP4728 @ ^1.0.9

##-- you NEED the next line (with the correct port)
##-- or the data upload will NOT work!
#upload_port = </dev/serial_port>
monitor_filters =
  esp32_exception_decoder